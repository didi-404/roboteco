<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Roboteco</title><link rel="stylesheet" href="styles.css">
</head><body>
<main class="auth-page"><div class="auth-card-simple"><section class="card join-visual"><img class="round-img" src="assets/robot-hero.svg" alt="Robô"><h1 class="section-title" style="font-size:2.8rem">Comece sua jornada hoje! 🚀</h1><p class="text-lead">Junte-se ao Roboteco e descubra robótica, lógica e engenharia de forma divertida e interativa.</p></section><section class="card auth-form"><a class="brand" href="home.html">Roboteco</a><h1 class="small-title">Criar Conta</h1><p class="muted">Preencha seus dados para começar a construir o futuro.</p><form data-form="cadastro"><div class="form-group"><label>Nome Completo</label><input class="input" name="nome" placeholder="Ex: Leonardo da Silva" required></div><div class="form-group"><label>E-mail</label><input class="input" name="email" type="email" placeholder="seu@email.com" required></div><div class="form-group"><label>Tipo de Usuário</label><select class="input" name="tipo"><option>Aluno</option><option>Instrutor</option><option>Escola interessada</option></select></div><div class="form-group password-wrap"><label>Senha</label><div style="position:relative"><input class="input" type="password" name="senha" placeholder="Mínimo 8 caracteres" required><button type="button" class="toggle-password" style="position:absolute;right:10px;top:8px;border:0;background:transparent;font-size:1.4rem">👁</button></div></div><label class="inline"><input type="checkbox" name="termos"> Concordo com os Termos de Serviço e Política de Privacidade.</label><button class="btn btn-primary block" style="margin-top:22px">Finalizar Cadastro →</button></form><p style="text-align:center">Já tem uma conta? <a style="color:var(--blue);font-weight:900" href="login.html">Faça Login</a></p></section></div></main>
<div class="toast"></div><script src="app.js"></script></body></html>
